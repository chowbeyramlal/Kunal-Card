<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kunal Sharma</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1e1e1e;
    --accent: #c8a96e;
    --accent-dim: rgba(200,169,110,0.1);
    --text: #f0ede8;
    --muted: #6b6b6b;
    --subtle: #2a2a2a;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    padding: 24px 16px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(200,169,110,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    width: 100%;
    max-width: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 22px;
    overflow: hidden;
    position: relative;
    animation: rise 0.8s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(22px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .top-bar {
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .card-body {
    padding: 38px 34px 30px;
  }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 22px;
    opacity: 0.75;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .eyebrow::before {
    content: '';
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: blink 2.5s ease-in-out infinite;
  }

  @keyframes blink {
    0%,100% { opacity: 1; } 50% { opacity: 0.2; }
  }

  .name {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 700;
    color: var(--text);
    line-height: 0.95;
    letter-spacing: -0.01em;
    margin-bottom: 16px;
  }

  .title-company {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 34px;
  }

  .title {
    font-size: 11px;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .sep {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }

  .company {
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.03em;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 28px;
  }

  .contacts {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-bottom: 0;
  }

  .contact-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .contact-label {
    font-family: 'DM Mono', monospace;
    font-size: 8.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .contact-value {
    font-size: 15px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: 0.01em;
  }

  /* QR section */
  .qr-section {
    background: #0a0a0a;
    border-top: 1px solid var(--border);
    padding: 30px 34px 34px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .qr-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.7;
    align-self: flex-start;
  }

  .qr-img-wrap {
    width: 210px;
    height: 210px;
    background: #fff;
    border-radius: 16px;
    padding: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 0 1px rgba(200,169,110,0.15), 0 8px 40px rgba(0,0,0,0.6);
  }

  .qr-img-wrap img {
    width: 100%;
    height: 100%;
    border-radius: 6px;
    display: block;
  }

  .qr-hint {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    line-height: 1.65;
    max-width: 230px;
  }

  .qr-hint span { color: var(--accent); }

  /* Footer */
  .card-footer {
    padding: 14px 34px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface);
  }

  .footer-mono {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.14em;
    color: #2e2e2e;
    text-transform: uppercase;
  }

  .footer-line {
    width: 24px;
    height: 1px;
    background: var(--accent);
    opacity: 0.3;
  }
</style>
</head>
